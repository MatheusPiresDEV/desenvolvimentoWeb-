<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
</head>
<body>

    <a href="index.html">Voltar para o Menu</a><br>
<fieldset>
    <legend>Cadastro Pessoas</legend>
    <h1>Informações Pessoais</h1>
    <h2>Cadastro do Cliente</h2>

    <form>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" placeholder="Digite o nome do cliente"><br><br>

        <label for="idade">Idade:</label><br>
        <input type="number" id="idade" placeholder="Digite a idade"><br><br>

        <label for="endereco">Endereço:</label><br>
        <input type="text" id="endereco" placeholder="Digite o endereço"><br><br>

        <label for="cidade">Cidade:</label><br>
        <input type="text" id="cidade" placeholder="Digite a cidade"><br><br>

        <label for="estado">Estado:</label><br>
        <input type="text" id="estado" placeholder="UF"><br><br>

        <label for="cep">CEP:</label><br>
        <input type="text" id="cep" placeholder="XXXXX-XXX"><br><br>

        <label for="tel-res">Tel/Res:</label><br>
        <input type="tel" id="tel-res" placeholder="99 99999-9999"><br><br>

        <label for="tel-cel">Tel/Cel:</label><br>
        <input type="tel" id="tel-cel" placeholder="99 99999-9999"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" placeholder="Digite o endereço de email"><br><br>

    </form>
</fieldset>
   <button type="submit">Enviar</button>
</body>
</html>
